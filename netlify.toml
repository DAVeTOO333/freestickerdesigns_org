[build]
  publish = "."
  functions = "netlify/functions"
  command = "npm install"

[[redirects]]
  from = "/api/stickers"
  to = "/.netlify/functions/stickers"
  status = 200

[[redirects]]
  from = "/api/sticker"
  to = "/.netlify/functions/sticker"
  status = 200

[[redirects]]
  from = "/api/submit"
  to = "/.netlify/functions/submit"
  status = 200

[[redirects]]
  from = "/api/artists"
  to = "/.netlify/functions/artists"
  status = 200

[[redirects]]
  from = "/api/artist-profile"
  to = "/.netlify/functions/artist-profile"
  status = 200

[[redirects]]
  from = "/api/file"
  to = "/.netlify/functions/file"
  status = 200

[[redirects]]
  from = "/api/debug"
  to = "/.netlify/functions/debug"
  status = 200

[functions]
  node_bundler = "esbuild"
