[build]
  publish = "."
  functions = "netlify/functions"
  command = "npm install"

[[redirects]]
  from = "/api/stickers"
  to = "/.netlify/functions/stickers"
  status = 200

[[redirects]]
  from = "/api/submit"
  to = "/.netlify/functions/submit"
  status = 200

[[redirects]]
  from = "/api/artists"
  to = "/.netlify/functions/artists"
  status = 200

[functions]
  node_bundler = "esbuild"
  included_files = ["node_modules/@neondatabase/**"]
